<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#230443">

  <title>Escuela Virtual — Presentación</title>

  <!-- Tipografía -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/presentacion.css">
</head>
<body>

<section id="presentacion" class="presentacion" role="banner" aria-label="Presentación de la escuela virtual">

  <!-- Orbes -->
  <div class="orbe orbe--1"></div>
  <div class="orbe orbe--2"></div>

  <!-- Contenido -->
  <div class="container">

    <!-- TEXTO -->
    <div class="texto">

      <div class="etiqueta">
        <span class="etiqueta__punto"></span>
        <span>Matrículas abiertas 2025</span>
      </div>

      <h1>
        Escuela<br>
        <span class="texto--dorado">Virtual</span>
      </h1>

      <h2>Formando profesionales del futuro</h2>

      <p>
        Brindamos educación de excelencia basada en innovación,
        disciplina y tecnología, preparando estudiantes para los
        desafíos del mundo moderno.
      </p>

      <!-- Estadísticas -->
      <div class="stats">
        <div class="stat">
          <span class="stat__numero">2,500</span>
          <span class="stat__texto">Estudiantes</span>
        </div>

        <div class="stat__divisor"></div>

        <div class="stat">
          <span class="stat__numero">45</span>
          <span class="stat__texto">Programas</span>
        </div>

        <div class="stat__divisor"></div>

        <div class="stat">
          <span class="stat__numero">98%</span>
          <span class="stat__texto">Satisfacción</span>
        </div>
      </div>

      <!-- Botones -->
      <div class="botones">
        <a href="#servicios" class="btn primary" aria-label="Ver programas">
          Ver programas
        </a>

        <a href="#contacto" class="btn secondary" aria-label="Ir a contacto">
          Contáctanos
        </a>
      </div>

    </div>

    <!-- IMAGEN -->
    <div class="imagen">
      <img src="../imagenes/presentacion.png"
           alt="Estudiantes estudiando en la Escuela Virtual"
           loading="lazy"
           decoding="async">
    </div>

  </div>

</section>

</body>
</html>
