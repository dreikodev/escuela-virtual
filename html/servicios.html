<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Servicios Educativos</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/servicios.css" />
</head>
<body>
 
  <!-- FONDO con imagen y capa "tela" -->
  <div class="bg-wrap">
    <img src="../imagenes/fondo_servicios.png" alt="Fondo educativo" />
  </div>
 
  <div class="page">
 
    <!-- ENCABEZADO -->
    <header>
      <div class="logo-icon">🎓</div>
      <div>
        <h1><span>Servicios</span> Educativos</h1>
        <p class="sub">Portal del Alumno · Acceso rápido a tus servicios</p>
      </div>
    </header>
 
    <!-- HERO -->
    <div class="hero">
  <p>
    ✨ Bienvenido al <strong>portal de servicios</strong>.<br>
    Aquí encontrarás <em>todo lo que necesitas</em><br>
    para tu vida académica — <span class="highlight">en un solo lugar.</span>
  </p>
</div>
 
    <!-- SERVICIOS -->
    <section class="services-section">
      <h2>¿Qué necesitas hoy?</h2>
      <div class="grid" id="grid-servicios">
        <!-- Las tarjetas se generan desde servicios.js -->
      </div>
    </section>
 
    <footer>© 2026 · Portal de Servicios Educativos · Todos los derechos reservados</footer>
  </div>
 
  <script src="../script/servicios.js"></script>
</body>
</html>
